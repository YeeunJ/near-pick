# =============================================
# 테스트 전용 설정 (application.properties 오버라이드)
# 로컬 MySQL에 nearpick_test DB가 존재해야 합니다.
# CREATE DATABASE nearpick_test DEFAULT CHARACTER SET utf8mb4;
# =============================================

# MySQL (로컬)
spring.datasource.url=jdbc:mysql://localhost:3306/nearpick_test?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=nearpick
spring.datasource.password=nearpick1234

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# JWT 테스트 시크릿 (테스트 전용, 32바이트 이상)
jwt.secret=test-secret-key-for-testing-only-must-be-at-least-32-bytes
jwt.expiration-ms=3600000

# Flyway 비활성화 (테스트는 create-drop으로 스키마 관리)
spring.flyway.enabled=false

