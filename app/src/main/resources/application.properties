# =============================================
# 공통 설정 (모든 프로필 공유)
# 시크릿 값은 절대 여기에 두지 않는다.
# 로컬: application-local.properties (git 무시)
# 운영: application-prod.properties  (git 무시)
# =============================================
spring.application.name=near-pick

# 로컬 개발 기본 프로필 (운영에서는 환경변수 SPRING_PROFILES_ACTIVE=prod 로 덮어씀)
spring.profiles.active=local

# Virtual Threads (Java 21+; Java 17에서는 무시됨 — JDK 21 전환 시 효과 발현)
spring.threads.virtual.enabled=true

# Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}


# JPA 공통 (ddl-auto / dialect 는 프로필별로 덮어씀)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# CORS (환경별 override 필수)
cors.allowed-origins=http://localhost:3000

# Kakao REST API (비밀값은 application-local.properties 또는 prod 환경변수로 주입)
kakao.rest-api-key=

# Resilience4j Circuit Breaker — FlashPurchase
resilience4j.circuitbreaker.instances.flashPurchase.sliding-window-size=10
resilience4j.circuitbreaker.instances.flashPurchase.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.flashPurchase.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.flashPurchase.permitted-number-of-calls-in-half-open-state=3
