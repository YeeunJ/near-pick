# =============================================
# 공통 설정 (모든 프로필 공유)
# 시크릿 값은 절대 여기에 두지 않는다.
# 로컬: application-local.properties (git 무시)
# 운영: application-prod.properties  (git 무시)
# =============================================
spring.application.name=near-pick

# 로컬 개발 기본 프로필 (운영에서는 환경변수 SPRING_PROFILES_ACTIVE=prod 로 덮어씀)
spring.profiles.active=local


# JPA 공통 (ddl-auto / dialect 는 프로필별로 덮어씀)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# CORS (환경별 override 필수)
cors.allowed-origins=http://localhost:3000
