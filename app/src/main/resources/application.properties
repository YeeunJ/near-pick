spring.application.name=near-pick

# =============================================
# Database (H2 - 개발용)
# 운영 환경에서는 PostgreSQL로 교체
# =============================================
spring.datasource.url=jdbc:h2:mem:nearpick;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (개발 편의용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =============================================
# PostgreSQL (운영 환경 — 주석 해제 후 사용)
# =============================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/nearpick
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=nearpick
# spring.datasource.password=
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate

# =============================================
# JWT
# =============================================
jwt.secret=nearpick-jwt-secret-key-must-be-at-least-32-chars!!
jwt.expiration-ms=3600000
