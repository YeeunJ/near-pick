services:
  mysql:
    image: mysql:8.4
    container_name: nearpick-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nearpick
      MYSQL_USER: nearpick
      MYSQL_PASSWORD: nearpick1234
    ports:
      - "3306:3306"
    volumes:
      - nearpick-mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unearpick", "-pnearpick1234"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nearpick-mysql-data:
